<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAGANDA — Built For The Obsessed</title>
  <meta name="description"
    content="MAGANDA: Türk yerli petrolhead giyim markası. Hız, özgürlük, aidiyet. Sadece tutkunlar anlar.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/discount-wheel.css">
</head>

<body class="no-scroll force-scrolled-nav">




  <!-- NOISE OVERLAY -->
  <div class="noise-overlay" aria-hidden="true"></div>
<main>
    <!-- CONTACT SECTION -->
    <section class="contact-page" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 120px 20px 60px; background: var(--bg-primary);">
      <div style="max-width: 600px; width: 100%; background: var(--bg-surface); padding: 50px 40px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
        <h2 style="font-family: 'Bebas Neue', sans-serif; font-size: 44px; margin-bottom: 8px; color: var(--text-primary); letter-spacing: 0.02em;">BİZE ULAŞIN</h2>
        <p style="color: var(--text-muted); font-size: 15px; font-family: 'Inter', sans-serif; margin-bottom: 40px;">Sorun mu var? İletişime geç. Biz buradayız.</p>

        <form id="contactForm" style="display: flex; flex-direction: column; gap: 24px;">
          <div>
            <label style="display: block; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">Adınız Soyadınız</label>
            <input type="text" required style="width: 100%; padding: 14px 16px; background: transparent; border: 1px solid var(--border-mid); color: var(--text-primary); border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 15px; outline: none; transition: border-color 0.3s;" onfocus="this.style.borderColor='var(--color-red)'" onblur="this.style.borderColor='var(--border-mid)'">
          </div>
          <div>
            <label style="display: block; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">E-posta Adresiniz</label>
            <input type="email" required style="width: 100%; padding: 14px 16px; background: transparent; border: 1px solid var(--border-mid); color: var(--text-primary); border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 15px; outline: none; transition: border-color 0.3s;" onfocus="this.style.borderColor='var(--color-red)'" onblur="this.style.borderColor='var(--border-mid)'">
          </div>
          <div>
            <label style="display: block; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">Mesajınız</label>
            <textarea required style="width: 100%; padding: 14px 16px; background: transparent; border: 1px solid var(--border-mid); color: var(--text-primary); border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 15px; min-height: 150px; resize: vertical; outline: none; transition: border-color 0.3s;" onfocus="this.style.borderColor='var(--color-red)'" onblur="this.style.borderColor='var(--border-mid)'"></textarea>
          </div>
          <button type="submit" style="width: 100%; padding: 16px; background: var(--text-primary); color: var(--bg-primary); border: none; border-radius: 6px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 15px; cursor: pointer; margin-top: 8px; transition: background 0.3s, transform 0.2s;" onmouseover="this.style.background='var(--color-red)'; this.style.color='#FFFFFF'; this.style.transform='translateY(-2px)'" onmouseout="this.style.background='var(--text-primary)'; this.style.color='var(--bg-primary)'; this.style.transform='translateY(0)'">MESAJ GÖNDER →</button>
        </form>

        <div style="margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div>
            <p style="font-family: 'Inter', sans-serif; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em;">E-posta</p>
            <p style="font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; color: var(--text-primary);">iletisim@maganda.com</p>
          </div>
          <div>
            <p style="font-family: 'Inter', sans-serif; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em;">Destek Saatleri</p>
            <p style="font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; color: var(--text-primary);">Hafta içi 09:00 - 18:00</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
  <script src="js/discount-wheel.js"></script>
  <script src="js/site-audio.js"></script>
</body>

</html>
